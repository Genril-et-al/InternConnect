name: CI

# Runs the same checks Vercel runs, but on every push and pull request — so a
# broken build is caught here instead of as a failed deployment.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer push to the same branch makes the in-flight run irrelevant.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Matches Vercel's default runtime. Keep these in step: a version
          # skew is how CI goes green on something the deploy then rejects.
          node-version: '22'
          cache: npm

      # `ci` not `install` — installs exactly the lockfile, and fails if
      # package.json and package-lock.json have drifted apart.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # `tsc -b && vite build`, byte for byte what Vercel executes. The
      # typecheck is the half that has actually been breaking.
      - name: Build
        run: npm run build
